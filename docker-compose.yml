services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
    # image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 768M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - >-
        --advertise-kafka-addr
        PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    mem_limit: 1g
    # Redpanda ports removed to prevent unauthenticated ingress
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test:
        - CMD
        - rpk
        - cluster
        - health
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    mem_limit: 256m
    # Redis is internal-only but exposed for local benchmarks
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    mem_limit: 1.5g
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DB: logrider_analytics
    # ClickHouse ports removed to prevent exposure
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - >-
        ./infra/clickhouse/migrations/001_init.sql:/docker-entrypoint-initdb.d/init-clickhouse.sql
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:8123/ping
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: logrider
    # Postgres ports removed to prevent exposure
    volumes:
      - >-
        ./infra/postgres/migrations/001_users.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d logrider
      interval: 10s
      timeout: 5s
      retries: 5

  stream-router:
    image: jeffail/benthos:4
    mem_limit: 256m
    volumes:
      - ./pipelines/benthos/router/unified.yaml:/benthos.yaml
    environment:
      REDPANDA_BROKERS: ${REDPANDA_INTERNAL_BROKERS:?REDPANDA_INTERNAL_BROKERS is required}
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  log-event-writer:
    build: ./apps/log-event-writer
    deploy:
      replicas: 8
    mem_limit: 256m
    environment:
      REDPANDA_BROKERS: redpanda:29092
      CLICKHOUSE_HOST: clickhouse
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ingest-api:
    build: ./apps/ingest-api
    mem_limit: 256m
    ports:
      - "${INGEST_HTTP_PORT:?INGEST_HTTP_PORT is required}:${INGEST_HTTP_PORT:?INGEST_HTTP_PORT is required}"
      - "${INGEST_GRPC_PORT:?INGEST_GRPC_PORT is required}:${INGEST_GRPC_PORT:?INGEST_GRPC_PORT is required}"
    environment:
      REDPANDA_BROKERS: ${REDPANDA_INTERNAL_BROKERS:?REDPANDA_INTERNAL_BROKERS is required}
      INGEST_API_KEY: ${INGEST_API_KEY:?INGEST_API_KEY is required}
      KAFKA_TOPIC_LOGS_RECEIVED: ${KAFKA_TOPIC_LOGS_RECEIVED:?KAFKA_TOPIC_LOGS_RECEIVED is required}
      INGEST_HTTP_PORT: ${INGEST_HTTP_PORT:?INGEST_HTTP_PORT is required}
      INGEST_GRPC_PORT: ${INGEST_GRPC_PORT:?INGEST_GRPC_PORT is required}
      INGEST_MAX_RECORDS_PER_REQUEST: ${INGEST_MAX_RECORDS_PER_REQUEST:?INGEST_MAX_RECORDS_PER_REQUEST is required}
      INGEST_MAX_BODY_BYTES: ${INGEST_MAX_BODY_BYTES:?INGEST_MAX_BODY_BYTES is required}
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${INGEST_HTTP_PORT:?INGEST_HTTP_PORT is required}/livez"]
      interval: 10s
      timeout: 5s
      retries: 5

  log-tag-writer:
    image: jeffail/benthos:4
    mem_limit: 256m
    volumes:
      - ./pipelines/benthos/persistence/tags-to-clickhouse.yaml:/benthos.yaml
    environment:
      REDPANDA_BROKERS: ${REDPANDA_INTERNAL_BROKERS:?REDPANDA_INTERNAL_BROKERS is required}
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  alert-dedup-worker:
    build: ./apps/alert-worker
    mem_limit: 256m
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      REDPANDA_BROKERS: redpanda:29092
    env_file:
      - .env

  log-tagger:
    build:
      context: ./apps/classifier-worker
      dockerfile: Dockerfile
    profiles: ["ml"]
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      LOGRIDER_ENABLE_ML_CLASSIFIER: "true"
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  log-tagger-lite:
    build:
      context: ./apps/classifier-worker
      dockerfile: Dockerfile
    mem_limit: 384m
    memswap_limit: 384m
    environment:
      LOGRIDER_ENABLE_ML_CLASSIFIER: "false"
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    build: ./apps/telegram-bot
    mem_limit: 128m
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    env_file:
      - .env

  web:
    build: ./apps/web
    mem_limit: 512m
    ports:
      - "${WEB_PORT:?WEB_PORT is required}:${WEB_PORT:?WEB_PORT is required}"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: ${WEB_PORT:?WEB_PORT is required}
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_HOST: clickhouse
      POSTGRES_URI: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DATABASE:?POSTGRES_DATABASE is required}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT:-3000}/livez"]
      interval: 10s
      timeout: 5s
      retries: 5

  alert-realtime-forwarder:
    image: jeffail/benthos:4
    profiles: ["debug-alert-forwarder"]
    mem_limit: 128m
    volumes:
      - ./pipelines/benthos/alerts/alerts-forwarder.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: -c /benthos.yaml

volumes:
  redpanda_data:
  redis_data:
  clickhouse_data:
  postgres_data:
