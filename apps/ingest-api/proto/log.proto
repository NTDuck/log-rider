syntax = "proto3";

package logrider;

service IngestService {
  rpc IngestLogs (IngestRequest) returns (IngestResponse) {}
}

message LogRecord {
  // Legacy fields for compatibility
  string Application_Name = 1;
  string Log_Level = 2;
  string Message = 3;
  string Timestamp = 4;
  string Trace_ID = 5;

  // Canonical V1 fields
  string application_name = 6;
  string severity = 7;
  string message = 8;
  string event_timestamp = 9;
  string trace_id = 10;
}

message IngestRequest {
  repeated LogRecord records = 1;
}

message IngestResponse {
  bool success = 1;
  string message = 2;
  int32 processed = 3;
}
