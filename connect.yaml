http:
  enabled: true
  address: 0.0.0.0:4195
  root_path: /benthos
  debug_endpoints: false
  cert_file: ""
  key_file: ""
  cors:
    enabled: false
    allowed_origins: []
  basic_auth:
    enabled: false
    realm: restricted
    username: ""
    password_hash: ""
    algorithm: sha256
    salt: ""
input:
  stdin: {}
buffer:
  none: {}
pipeline:
  processors:
    - sleep:
        duration: 500ms
    - mapping: |
        root.doc = this
        root.first_name = this.names.index(0).uppercase()
        root.last_name = this.names.index(-1).hash("sha256").encode("base64")
output:
  stdout: {}
input_resources: []
processor_resources: []
output_resources: []
cache_resources: []
rate_limit_resources: []
logger:
  level: INFO
  format: logfmt
  add_timestamp: true
  level_name: level
  timestamp_name: time
  message_name: msg
  static_fields:
    "@service": redpanda-connect
  file:
    path: ""
    rotate: false
    rotate_max_age_days: 0
metrics:
  prometheus: {}
  mapping: ""
tracer:
  none: {}
shutdown_delay: 0s
shutdown_timeout: 20s
error_handling:
  strict: false
tests: []
redpanda:
  seed_brokers: []
  client_id: redpanda-connect
  tls:
    enabled: false
    skip_cert_verify: false
    enable_renegotiation: false
    root_cas: ""
    root_cas_file: ""
    client_certs: []
  sasl: []
  metadata_max_age: 1m
  request_timeout_overhead: 10s
  conn_idle_timeout: 20s
  tcp:
    connect_timeout: 0s
    keep_alive:
      idle: 15s
      interval: 15s
      count: 9
    tcp_user_timeout: 0s
  pipeline_id: ""
  logs_topic: ""
  logs_level: info
  status_topic: ""
  idempotent_write: true
  acks: all
  allow_auto_topic_creation: true
  timeout: 10s
  max_message_bytes: 1MiB
  broker_write_max_bytes: 100MiB
  max_buffered_records: 10000
  max_buffered_bytes: "0"
  max_in_flight_requests: 1
  record_retries: 0
  record_delivery_timeout: 0s
