input:
  kafka:
    addresses:
      - ${REDPANDA_BROKERS}
    topics:
      - ${KAFKA_TOPIC_LOGS_PERSISTENCE_REQUESTED}
    consumer_group: "${KAFKA_GROUP_LOG_EVENT_WRITER}"

buffer:
  memory:
    limit: 67108864
    batch_policy:
      count: 2000
      period: "250ms"
    # batch_policy:
    #   count: 500
    #   period: "1s"

pipeline:
  processors:
    - branch:
        request_map: 'root = this'
        processors:
          - archive:
              format: lines
          - http:
              url: "http://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}/?query=INSERT%20INTO%20${CLICKHOUSE_DATABASE}.${CLICKHOUSE_TABLE_LOG_EVENTS}%20FORMAT%20JSONEachRow&async_insert=1&wait_for_async_insert=1&user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}"
              verb: POST
              headers:
                Content-Type: application/x-ndjson
        result_map: 'root = this'

output:
  switch:
    cases:
      - check: errored()
        output:
          kafka:
            addresses:
              - ${REDPANDA_BROKERS}
            topic: ${KAFKA_TOPIC_DLQ_LOG_PERSISTENCE_FAILED}
      - output:
          redis_pubsub:
            url: ${REDIS_URL}
            channel: ${REDIS_CHANNEL_LOG_REALTIME}
          processors:
            - mapping: |
                root = this
                root.status = "persisted"
