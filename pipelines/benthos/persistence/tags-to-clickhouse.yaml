input:
  kafka:
    addresses:
      - ${REDPANDA_BROKERS}
    topics:
      - ${KAFKA_TOPIC_LOG_TAGS_ASSIGNED}
    consumer_group: "${KAFKA_GROUP_LOG_TAG_WRITER}"
    start_from_oldest: true
    batching:
      count: 10000
      period: 1s

output:
  broker:
    pattern: fan_out
    outputs:
      - fallback:
          - http_client:
              url: "http://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}/?query=INSERT%20INTO%20${CLICKHOUSE_DATABASE}.${CLICKHOUSE_TABLE_LOG_EVENT_TAGS}%20FORMAT%20JSONEachRow&user=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}"
              verb: POST
              headers:
                Content-Type: application/x-ndjson
            processors:
              - archive:
                  format: lines
          - kafka:
              addresses:
                - ${REDPANDA_BROKERS}
              topic: ${KAFKA_TOPIC_DLQ_TAG_WRITE_FAILED}
