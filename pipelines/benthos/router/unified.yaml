input:
  kafka:
    addresses:
      - ${REDPANDA_BROKERS}
    topics:
      - ${KAFKA_TOPIC_LOGS_RECEIVED}
    consumer_group: "${KAFKA_GROUP_ROUTER}"

pipeline:
  processors:
    # 1. Extract values if deeply nested by standard HTTP proxies
    - mapping: |
        root = if this.type() == "object" && this.exists("value") { this.value } else { this }

    # 2. Normalize and enrich the data struct
    - mapping: |
        root = this
        root.trace_id = this.Trace_ID | this.trace_id | uuid_v4()

output:
  broker:
    pattern: fan_out
    outputs:
      # Step 1: Broadcast "Ingested" immediately so dashboard shows the log first
      - redis_pubsub:
          url: ${REDIS_URL}
          channel: ${REDIS_CHANNEL_LOG_REALTIME}
        processors:
          - mapping: |
              root = this
              root.status = "received"

      # Step 2: Route to classifier for asynchronous tag enrichment
      - kafka:
          addresses: [ "${REDPANDA_BROKERS}" ]
          topic: ${KAFKA_TOPIC_LOGS_NORMALIZED}

      # Step 3: Broadcast "Normalized" after the log has entered the normalized topic
      - redis_pubsub:
          url: ${REDIS_URL}
          channel: ${REDIS_CHANNEL_LOG_REALTIME}
        processors:
          - mapping: |
              root = this
              root.status = "normalized"

      # Step 4: Route to persistence immediately so dashboard history is not gated by ML startup
      - kafka:
          addresses: [ "${REDPANDA_BROKERS}" ]
          topic: ${KAFKA_TOPIC_LOGS_PERSISTENCE_REQUESTED}
        processors:
          - mapping: |
              root = this
              root.tags = []

      # Step 5: Route to alert pipeline, worker will filter by config
      - kafka:
          addresses: [ "${REDPANDA_BROKERS}" ]
          topic: ${KAFKA_TOPIC_ALERT_CANDIDATES}
        processors:
          - mapping: |
              root = if this.severity == "ERROR" || this.severity == "CRITICAL" { this } else { deleted() }
              root.alert_candidate_at = now()
