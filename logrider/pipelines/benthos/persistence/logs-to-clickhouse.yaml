input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logrider.logs.persistence-requested.v1
    consumer_group: "logrider.persistence.log-events-writer.v1"

buffer:
  memory:
    limit: 67108864
    batch_policy:
      count: 2000
      period: "250ms"
    # batch_policy:
    #   count: 500
    #   period: "1s"

pipeline:
  processors:
    - branch:
        request_map: 'root = this'
        processors:
          - archive:
              format: lines
          - http:
              url: "http://clickhouse:8123/?query=INSERT%20INTO%20logrider_analytics.log_events%20FORMAT%20JSONEachRow&async_insert=1&wait_for_async_insert=1&user=${CLICKHOUSE_USER:default}&password=${CLICKHOUSE_PASSWORD:password}"
              verb: POST
              headers:
                Content-Type: application/x-ndjson
        result_map: 'root = this'

output:
  switch:
    cases:
      - check: errored()
        output:
          kafka:
            addresses:
              - redpanda:29092
            topic: logrider.dlq.log-persistence-failed.v1
      - output:
          redis_pubsub:
            url: redis://redis:6379
            channel: logrider:realtime:log-events
          processors:
            - mapping: |
                root = this
                root.status = "persisted"
