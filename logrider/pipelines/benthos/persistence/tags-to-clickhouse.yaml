input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logrider.logs.tags-assigned.v1
    consumer_group: "logrider.persistence.log-tags-writer.v1"
    start_from_oldest: true
    batching:
      count: 10000
      period: 1s

output:
  broker:
    pattern: fan_out
    outputs:
      - fallback:
          - http_client:
              url: "http://clickhouse:8123/?query=INSERT%20INTO%20logrider_analytics.log_event_tags%20FORMAT%20JSONEachRow&user=${CLICKHOUSE_USER:default}&password=${CLICKHOUSE_PASSWORD:password}"
              verb: POST
              headers:
                Content-Type: application/x-ndjson
            processors:
              - archive:
                  format: lines
          - kafka:
              addresses:
                - redpanda:29092
              topic: logrider.dlq.log-tags-write-failed.v1
