input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-raw
    consumer_group: "logrider_unified"

pipeline:
  processors:
    # 1. Extract values if deeply nested by standard HTTP proxies
    - mapping: |
        root = if this.type() == "object" && this.exists("value") { this.value } else { this }
        
    # 2. Normalize and enrich the data struct
    - mapping: |
        root = this
        root.Trace_ID = this.Trace_ID | uuid_v4()
        root.Status = "Normalized"

output:
  broker:
    pattern: fan_out
    outputs:
      - kafka:
          addresses: [ "redpanda:29092" ]
          topic: logs-persist
      
      - kafka:
          addresses: [ "redpanda:29092" ]
          topic: alerts-raw
        processors:
          # Filter strictly for high-severity issues
          - mapping: |
              root = if this.Log_Level == "ERROR" || this.Log_Level == "CRITICAL" { this } else { deleted() }

      - redis_pubsub:
          url: redis://redis:6379
          channel: ws-events
