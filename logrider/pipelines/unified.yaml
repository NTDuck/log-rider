input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-raw
    consumer_group: "logrider_unified"

pipeline:
  processors:
    - try:
      - mapping: |
          root = this
          root.Timestamp = (this.Timestamp | now()).ts_format("2006-01-02 15:04:05.999")
          root.Log_Level = (this.Log_Level | "INFO").uppercase()
          root.Application_Name = this.Application_Name | "unknown"
          root.Message = this.Message | ""
          root.Trace_ID = this.Trace_ID | uuid_v4()
    - catch:
      - mapping: |
          root = this
          root.error = error()

output:
  broker:
    pattern: fan_out
    outputs:
      - switch:
          cases:
            - check: 'this.exists("error")'
              output:
                kafka:
                  addresses:
                    - redpanda:29092
                  topic: dlq-logs
            - output:
                drop: {}
      - switch:
          cases:
            - check: '!this.exists("error")'
              output:
                broker:
                  pattern: fan_out
                  outputs:
                    - kafka:
                        addresses:
                          - redpanda:29092
                        topic: logs-persist
                    - fallback:
                        - redis_pubsub:
                            url: redis://redis:6379
                            channel: ws-frontend:${! this.log.Application_Name }
                      processors:
                        - mapping: |
                            root.type = "HYDRATED_LOG"
                            root.status = "Normalized"
                            root.log = this
                    - fallback:
                        - redis_pubsub:
                            url: redis://redis:6379
                            channel: ws-frontend:global
                      processors:
                        - mapping: |
                            root.type = "HYDRATED_LOG"
                            root.status = "Normalized"
                            root.log = this
                    - switch:
                        cases:
                          - check: 'this.Log_Level == "ERROR" || this.Log_Level == "CRITICAL"'
                            output:
                              broker:
                                pattern: fan_out
                                outputs:
                                  - redis_pubsub:
                                      url: redis://redis:6379
                                      channel: alerts-raw:${! this.Application_Name }
                                  - redis_pubsub:
                                      url: redis://redis:6379
                                      channel: alerts-raw:global
                          - output:
                              drop: {}
                    - kafka:
                        addresses:
                          - redpanda:29092
                        topic: logs-normalized
                      processors:
                        - mapping: |
                            root = this
                            root.Message = deleted()
            - output:
                drop: {}
