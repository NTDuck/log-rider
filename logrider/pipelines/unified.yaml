input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-ingested
    consumer_group: "logrider_unified"

pipeline:
  processors:
    # 1. Extract values if deeply nested by standard HTTP proxies
    - mapping: |
        root = if this.type() == "object" && this.exists("value") { this.value } else { this }

    # 2. Normalize and enrich the data struct
    - mapping: |
        root = this
        root.Trace_ID = this.Trace_ID | uuid_v4()

output:
  broker:
    pattern: fan_out
    outputs:
      # Step 1: Broadcast "Ingested" immediately so dashboard shows the log first
      - redis_pubsub:
          url: redis://redis:6379
          channel: ws-events
        processors:
          - mapping: |
              root = this
              root.Status = "Ingested"

      # Step 2: Route to classifier for asynchronous tag enrichment
      - kafka:
          addresses: [ "redpanda:29092" ]
          topic: logs-normalized

      # Step 3: Broadcast "Normalized" after the log has entered the normalized topic
      - redis_pubsub:
          url: redis://redis:6379
          channel: ws-events
        processors:
          - mapping: |
              root = this
              root.Status = "Normalized"

      # Step 4: Route to persistence immediately so dashboard history is not gated by ML startup
      - kafka:
          addresses: [ "redpanda:29092" ]
          topic: logs-persist
        processors:
          - mapping: |
              root = this
              root.Tags = []

      # Step 5: Route errors/criticals to alert pipeline
      - kafka:
          addresses: [ "redpanda:29092" ]
          topic: alerts-ingested
        processors:
          - mapping: |
              root = if this.Log_Level == "ERROR" || this.Log_Level == "CRITICAL" { this } else { deleted() }
