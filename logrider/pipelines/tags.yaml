input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-tagged
    consumer_group: "logrider_tags_1"
    start_from_oldest: false
    batching:
      count: 10000
      period: 1s

output:
  broker:
    pattern: fan_out
    outputs:
      - fallback:
          - http_client:
              url: "http://clickhouse:8123/?query=INSERT%20INTO%20logrider.log_tags%20FORMAT%20JSONEachRow&user=${CLICKHOUSE_USER:default}&password=${CLICKHOUSE_PASSWORD:password}"
              verb: POST
              headers:
                Content-Type: application/x-ndjson
            processors:
              - archive:
                  format: lines
          - kafka:
              addresses:
                - redpanda:29092
              topic: dlq-logs
