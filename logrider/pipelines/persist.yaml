input:
  kafka:
    addresses:
      - redpanda:29092
    topics:
      - logs-persist
    consumer_group: "logrider_persist"

buffer:
  memory:
    limit: 524288000
    batch_policy:
      count: 5000
      period: "1s"

output:
  broker:
    pattern: fan_out
    outputs:
      # Broadcast "Persisted" status to dashboard (each individual message, before archive)
      - redis_pubsub:
          url: redis://redis:6379
          channel: ws-events
        processors:
          - mapping: |
              root = this
              root.Status = "Persisted"

      # Write the batch to ClickHouse
      - fallback:
          - http_client:
              url: "http://clickhouse:8123/?query=INSERT%20INTO%20logrider.logs_enriched%20FORMAT%20JSONEachRow&user=default&password=password"
              verb: POST
              headers:
                Content-Type: application/x-ndjson
              max_in_flight: 1
            processors:
              - archive:
                  format: lines
          - kafka:
              addresses:
                - redpanda:29092
              topic: dlq-clickhouse
