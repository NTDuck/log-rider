<script>
    if (typeof generateTelegramLink === 'undefined') {
        window.generateTelegramLink = async function() {
            const token = localStorage.getItem('logrider_token');
            if (!token) return;
            try {
                const res = await fetch('/api/telegram/generate-link-token', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.token) {
                    alert(`To receive alerts, send this command to our Telegram bot:\n\n/link ${data.token}\n\n(This token expires in 10 minutes)`);
                } else {
                    alert('Failed to generate token: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Error generating token.');
            }
        };
    }

    if (typeof toggleAlerts === 'undefined') {
        window.toggleAlerts = function() {
            const current = localStorage.getItem('alerts_enabled') !== 'false';
            localStorage.setItem('alerts_enabled', !current);
            if (typeof updateAlertsIcon === 'function') updateAlertsIcon();
        };
    }
    
    if (typeof updateAlertsIcon === 'undefined') {
        window.updateAlertsIcon = function() {
            const enabled = localStorage.getItem('alerts_enabled') !== 'false';
            const icon = document.getElementById('bell-icon');
            if (!icon) return;
            if (enabled) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>';
                icon.classList.remove('text-gray-500');
                icon.classList.add('text-white');
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2"></line>';
                icon.classList.remove('text-white');
                icon.classList.add('text-gray-500');
            }
        };
    }
    if (typeof logout === 'undefined') {
        window.logout = function() {
            localStorage.removeItem('logrider_token');
            window.location.reload();
        };
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof updateAlertsIcon === 'function') {
            updateAlertsIcon();
        }
    });
</script>
