<header class="cscape-top-navigation sticky top-0 z-50">
    <div class="mx-auto flex max-w-[1440px] items-center justify-between px-4 py-2 sm:px-6 lg:px-8">
        <div class="flex min-w-0 items-center gap-5">
            <a href="/dashboard" class="flex min-w-0 items-center gap-3 text-white no-underline">
                <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded border border-white/10 bg-white/5">
                    <img src="/public/log-rider.png" alt="LogRider Logo" class="cscape-service-logo mix-blend-screen" />
                </span>
                <span class="min-w-0">
                    <span class="cscape-service-title block truncate">LogRider</span>
                    <span class="cscape-service-subtitle block truncate">Operations console</span>
                </span>
            </a>
            <nav id="top-nav" class="hidden items-center gap-1 text-sm font-medium md:flex" aria-label="Service navigation">
                <a data-nav-path="/dashboard" href="/dashboard" class="cscape-nav-link text-slate-300 transition-colors">Dashboard</a>
                <a data-nav-path="/alerts" href="/alerts" class="cscape-nav-link text-slate-300 transition-colors">Alerts</a>
                <a data-nav-path="/metrics" href="/metrics" class="cscape-nav-link text-slate-300 transition-colors">Metrics</a>
                <a id="nav-config" data-nav-path="/config" href="/config" class="cscape-nav-link hidden text-slate-300 transition-colors">Config</a>
            </nav>
        </div>

        <div class="flex shrink-0 items-center gap-1">
            <a href="https://github.com/NTDuck/log-rider" target="_blank" rel="noopener noreferrer" title="GitHub Repository" aria-label="GitHub Repository" class="cscape-icon-button inline-flex h-9 w-9 items-center justify-center transition-colors">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z" />
                </svg>
            </a>

            <a href="https://deepwiki.com/NTDuck/log-rider" target="_blank" rel="noopener noreferrer" title="Documentation" aria-label="Documentation" class="cscape-icon-button inline-flex h-9 w-9 items-center justify-center transition-colors">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7.5h8M8 12h8m-8 4.5h5M6.75 3.75h10.5A1.75 1.75 0 0 1 19 5.5v13a1.75 1.75 0 0 1-1.75 1.75H6.75A1.75 1.75 0 0 1 5 18.5v-13a1.75 1.75 0 0 1 1.75-1.75Z" />
                </svg>
            </a>

            <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme" class="cscape-icon-button inline-flex h-9 w-9 items-center justify-center transition-colors focus:outline-none">
                <svg id="theme-toggle-dark-icon" class="hidden h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586Z"></path>
                </svg>
                <svg id="theme-toggle-light-icon" class="hidden h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 2a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm4 8a4 4 0 1 1-8 0 4 4 0 0 1 8 0Zm-.464 4.95.707.707a1 1 0 0 0 1.414-1.414l-.707-.707a1 1 0 0 0-1.414 1.414Zm2.12-10.607a1 1 0 0 1 0 1.414l-.706.707a1 1 0 1 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 0ZM17 11a1 1 0 1 0 0-2h-1a1 1 0 1 0 0 2h1Zm-7 4a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1ZM5.05 6.464A1 1 0 1 0 6.465 5.05l-.708-.707a1 1 0 0 0-1.414 1.414l.707.707Zm1.414 8.486-.707.707A1 1 0 0 1 4.343 14.95l.707-.707a1 1 0 0 1 1.414 1.414ZM4 11a1 1 0 1 0 0-2H3a1 1 0 0 0 0 2h1Z"></path>
                </svg>
            </button>

            <div id="user-controls" class="hidden items-center gap-1">
                <button onclick="toggleAlerts()" id="bell-btn" title="Toggle popups" aria-label="Toggle popups" class="cscape-icon-button inline-flex h-9 w-9 items-center justify-center transition-colors">
                    <svg id="bell-icon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.03 2.03 0 0 1 18 14.158V11a6.002 6.002 0 0 0-4-5.659V5a2 2 0 1 0-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 1 1-6 0v-1m6 0H9"></path>
                    </svg>
                    <svg id="bell-off-icon" class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0M3.124 3.124l17.752 17.752"></path>
                    </svg>
                </button>

                <button id="telegram-link-btn" type="button" onclick="generateTelegramLink()" title="Telegram link" aria-label="Telegram link" class="cscape-icon-button inline-flex h-9 w-9 items-center justify-center transition-colors hover:text-[#7dd3fc]">
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0Zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.223-.548.223l.188-2.85 5.18-4.686c.223-.204-.054-.31-.346-.116l-6.4 4.024-2.76-.86c-.6-.188-.614-.6.126-.89l10.81-4.168c.5-.188.943.116.85 1.35Z"/>
                    </svg>
                </button>

                <div class="mx-1 hidden h-5 w-px bg-white/15 sm:block"></div>
                <span id="role-badge" class="cscape-user-badge hidden max-w-[180px] items-center gap-1.5 px-3 py-1 text-sm font-medium text-slate-100 sm:flex">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <span id="role-badge-text" class="truncate"></span>
                </span>

                <button onclick="logout()" title="Sign out" aria-label="Sign out" class="cscape-icon-button inline-flex h-9 w-9 items-center justify-center transition-colors">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 17l5-5m0 0-5-5m5 5H9m-4 7h4a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</header>

<div id="telegram-link-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 px-4 py-6 backdrop-blur-sm">
    <div class="w-full max-w-lg overflow-hidden rounded-xl border border-aws-border bg-white shadow-2xl dark:border-aws-borderDark dark:bg-[#1c2539]">
        <div class="flex items-start justify-between border-b border-aws-border px-6 py-4 dark:border-aws-borderDark">
            <div>
                <h2 class="text-lg font-bold text-aws-text dark:text-aws-textDark">Link Telegram</h2>
                <p class="mt-1 text-sm text-aws-textMuted dark:text-aws-textMutedDark">
                    Send this command to the LogRider Telegram bot. The link token expires in 10 minutes.
                </p>
            </div>
            <button type="button" onclick="closeTelegramLinkModal()" class="rounded p-1 text-aws-textMuted transition-colors hover:bg-gray-100 hover:text-aws-text dark:text-aws-textMutedDark dark:hover:bg-white/10 dark:hover:text-white" aria-label="Close Telegram link dialog">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="space-y-4 px-6 py-5">
            <div id="telegram-link-loading" class="hidden rounded border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-700 dark:border-sky-900/60 dark:bg-sky-500/10 dark:text-sky-300">
                Generating Telegram link command...
            </div>

            <div id="telegram-link-content" class="hidden space-y-3">
                <label for="telegram-link-command" class="block text-sm font-bold text-aws-text dark:text-aws-textDark">
                    Telegram command
                </label>

                <div class="flex gap-2">
                    <input id="telegram-link-command" readonly class="min-w-0 flex-1 rounded border border-gray-300 bg-gray-50 px-3 py-2 font-mono text-sm text-aws-text focus:outline-none dark:border-gray-600 dark:bg-[#16191f] dark:text-aws-textDark" value="">
                    <button id="telegram-copy-btn" type="button" onclick="copyTelegramLinkCommand()" class="rounded-full bg-aws-primary px-4 py-2 text-sm font-bold text-white transition-colors hover:bg-aws-primaryHover">
                        Copy
                    </button>
                </div>

                <p id="telegram-copy-status" class="min-h-[1.25rem] text-sm text-emerald-600 dark:text-emerald-400"></p>
            </div>

            <div id="telegram-link-error" class="hidden rounded border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:border-red-900/60 dark:bg-red-500/10 dark:text-red-300"></div>
        </div>

        <div class="flex justify-end gap-2 border-t border-aws-border px-6 py-4 dark:border-aws-borderDark">
            <button type="button" onclick="closeTelegramLinkModal()" class="rounded-full border border-gray-300 px-4 py-2 text-sm font-bold text-aws-text transition-colors hover:bg-gray-100 dark:border-gray-600 dark:text-aws-textDark dark:hover:bg-white/10">
                Close
            </button>
        </div>
    </div>
</div>

<script>
    if (typeof openTelegramLinkModal === 'undefined') {
        window.openTelegramLinkModal = function() {
            const modal = document.getElementById('telegram-link-modal');
            if (!modal) return;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };
    }

    if (typeof closeTelegramLinkModal === 'undefined') {
        window.closeTelegramLinkModal = function() {
            const modal = document.getElementById('telegram-link-modal');
            if (!modal) return;

            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };
    }

    if (typeof setTelegramLinkModalState === 'undefined') {
        window.setTelegramLinkModalState = function({ loading = false, command = '', error = '' } = {}) {
            const loadingEl = document.getElementById('telegram-link-loading');
            const contentEl = document.getElementById('telegram-link-content');
            const commandEl = document.getElementById('telegram-link-command');
            const errorEl = document.getElementById('telegram-link-error');
            const statusEl = document.getElementById('telegram-copy-status');

            loadingEl?.classList.toggle('hidden', !loading);
            contentEl?.classList.toggle('hidden', !command);
            errorEl?.classList.toggle('hidden', !error);

            if (commandEl) commandEl.value = command;
            if (errorEl) errorEl.textContent = error;
            if (statusEl) statusEl.textContent = '';
        };
    }

    if (typeof copyTelegramLinkCommand === 'undefined') {
        window.copyTelegramLinkCommand = async function() {
            const input = document.getElementById('telegram-link-command');
            const status = document.getElementById('telegram-copy-status');
            const value = input?.value || '';

            if (!value) return;

            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(value);
                } else {
                    input.select();
                    document.execCommand('copy');
                    input.blur();
                }

                if (status) status.textContent = 'Copied to clipboard.';
            } catch (error) {
                console.error(error);
                if (status) status.textContent = 'Could not copy. Select the command manually.';
            }
        };
    }

    if (typeof generateTelegramLink === 'undefined') {
        window.generateTelegramLink = async function() {
            openTelegramLinkModal();
            setTelegramLinkModalState({ loading: true });

            const token = localStorage.getItem('logrider_token');
            const headers = token ? { Authorization: `Bearer ${token}` } : {};

            try {
                const res = await fetch('/api/telegram/generate-link-token', {
                    method: 'POST',
                    headers,
                    credentials: 'same-origin',
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.error || `Telegram link request failed with HTTP ${res.status}`);
                }

                const command = data.command || (data.token ? `/link ${data.token}` : '');

                if (!command) {
                    throw new Error('Server did not return a Telegram link command.');
                }

                setTelegramLinkModalState({ command });
            } catch (error) {
                console.error(error);
                setTelegramLinkModalState({
                    error: error.message || 'Could not generate Telegram link command.',
                });
            }
        };
    }

    if (typeof toggleAlerts === 'undefined') {
        window.toggleAlerts = function() {
            const enabled = localStorage.getItem('alerts_enabled') !== 'false';
            localStorage.setItem('alerts_enabled', String(!enabled));
            if (typeof updateAlertsIcon === 'function') updateAlertsIcon();
        };
    }

    if (typeof updateAlertsIcon === 'undefined') {
        window.updateAlertsIcon = function() {
            const enabled = localStorage.getItem('alerts_enabled') !== 'false';
            const icon = document.getElementById('bell-icon');
            const offIcon = document.getElementById('bell-off-icon');
            const btn = document.getElementById('bell-btn');
            
            if (icon) icon.classList.toggle('hidden', !enabled);
            if (offIcon) offIcon.classList.toggle('hidden', enabled);
            
            if (btn) {
                btn.classList.toggle('text-slate-500', !enabled);
                btn.classList.toggle('text-slate-300', enabled);
            }
        };
    }

    if (typeof logout === 'undefined') {
        window.logout = function() {
            localStorage.removeItem('logrider_token');
            localStorage.removeItem('logrider_role');
            localStorage.removeItem('logrider_username');
            window.location.reload();
        };
    }

    if (typeof syncTopbarUser === 'undefined') {
        window.syncTopbarUser = function() {
            const token = localStorage.getItem('logrider_token');
            const role = localStorage.getItem('logrider_role');
            const username = localStorage.getItem('logrider_username');
            const controls = document.getElementById('user-controls');
            const badge = document.getElementById('role-badge-text');
            const nav = document.getElementById('top-nav');
            const configNav = document.getElementById('nav-config');

            if (nav) nav.classList.remove('hidden');

            if (token && controls) {
                controls.classList.remove('hidden');
                controls.classList.add('flex');
            }

            if (badge) {
                badge.textContent = username || role || '';
            }

            if (configNav) {
                if (role === 'admin') configNav.classList.remove('hidden');
                else configNav.classList.add('hidden');
            }

            const path = window.location.pathname;
            document.querySelectorAll('[data-nav-path]').forEach((link) => {
                const active = link.getAttribute('data-nav-path') === path;
                link.classList.toggle('text-white', active);
                link.classList.toggle('bg-white/10', active);
                link.classList.toggle('text-slate-300', !active);
            });

            if (typeof updateAlertsIcon === 'function') updateAlertsIcon();
        };
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof syncTopbarUser === 'function') syncTopbarUser();

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeTelegramLinkModal();
        });

        document.getElementById('telegram-link-modal')?.addEventListener('click', (event) => {
            if (event.target?.id === 'telegram-link-modal') closeTelegramLinkModal();
        });
    });
</script>
<script src="/public/js/custom-controls.js"></script>
