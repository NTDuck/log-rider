<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log-rider - Alerts</title>
    <link href="https://fonts.cdnfonts.com/css/amazon-ember" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aws: {
                            nav: '#0f1b2d', navDark: '#0b1426', bg: '#f2f3f3', bgDark: '#0f1b2d', panel: '#ffffff', panelDark: '#1c2539',
                            border: '#eaeded', borderDark: '#414d5c', text: '#16191f', textDark: '#ffffff',
                            textMuted: '#545b64', textMutedDark: '#9ba7b6', primary: '#0972d3', primaryHover: '#035b96',
                            link: '#0073bb', linkDark: '#44b9ff'
                        }
                    },
                    fontFamily: {
                        sans: ['"Amazon Ember"', 'sans-serif'],
                        mono: ['Menlo', 'Monaco', 'Consolas', '"Courier New"', 'monospace']
                    }
                }
            }
        }
    </script>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
        } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-aws-bg text-aws-text dark:bg-aws-bgDark dark:text-aws-textDark antialiased transition-colors duration-200">
    <header class="bg-aws-nav text-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between py-3 w-full">
            <div class="flex items-center space-x-6">
                <a href="/dashboard" class="flex items-center space-x-2 no-underline text-white hover:text-gray-200">
                <span class="font-semibold text-lg tracking-tight flex items-center">
                    log-rider
                </span>
                <span class="bg-green-600/20 text-green-400 border border-green-500/30 text-xs px-2 py-0.5 rounded-full font-medium ml-2">Preview</span>
            </a>
            <nav id="top-nav" class="hidden md:flex space-x-4 items-center">
                <a href="/dashboard" class="text-sm font-medium hover:text-white text-gray-300 transition-colors">Dashboard</a>
                <a href="/alerts" class="text-sm font-medium text-white transition-colors">Alerts</a>
                <a id="nav-config" href="/config" class="text-sm font-medium hover:text-white text-gray-300 transition-colors hidden">Config</a>
                <a href="/metrics" class="text-sm font-medium hover:text-white text-gray-300 transition-colors">Metrics</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <!-- Dark Mode Toggle -->
            
            <a href="https://github.com/NTDuck/log-rider" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="p-1.5 rounded-full hover:bg-white/10 transition-colors">
                <svg class="w-5 h-5 text-gray-300 hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path></svg>
            </a>
            <a href="https://deepwiki.com/NTDuck/log-rider" target="_blank" rel="noopener noreferrer" aria-label="Deepwiki" class="p-1.5 rounded-full hover:bg-white/10 transition-colors">
                <svg class="w-5 h-5 text-gray-300 hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </a>
<button id="theme-toggle" class="p-1.5 bg-white/10 rounded-full hover:bg-white/20 transition-colors focus:outline-none focus:ring-2 focus:ring-aws-primary" aria-label="Toggle Dark Mode">
                <svg id="theme-toggle-dark-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
            </button>
            <div id="user-controls" class="flex items-center space-x-4 text-sm font-medium">
                <div class="flex items-center space-x-2 bg-black/20 rounded-md px-3 py-1.5 border border-white/10">
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span id="role-badge" class="text-gray-200"></span>
                </div>
                <button onclick="logout()" class="bg-aws-primary hover:bg-aws-primaryHover text-white px-3 py-1 text-xs font-bold rounded-full transition-colors border border-transparent shadow-sm">Sign Out</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 py-8 space-y-6" id="app-content" style="display:none;">
        <h1 class="text-2xl font-bold text-aws-text dark:text-aws-textDark mb-2">Real-Time Alerts Monitor</h1>
        <p class="text-sm text-aws-textMuted dark:text-aws-textMutedDark mb-6">Monitors deduplicated critical error streams with real-time counters.</p>
        
        <div class="bg-aws-panel dark:bg-aws-panelDark border border-aws-border dark:border-aws-borderDark rounded-lg shadow-sm">
            <div class="px-5 py-4 border-b border-aws-border dark:border-aws-borderDark bg-gray-50/50 dark:bg-black/10 rounded-t-lg flex justify-between">
                <h2 class="text-lg font-bold text-red-600 dark:text-red-400 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Active Incident Filters
                </h2>
                <div class="flex items-center space-x-2 text-sm text-aws-textMuted dark:text-aws-textMutedDark">
                    <span class="relative flex h-2.5 w-2.5 mr-1">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                    Live Updates
                </div>
            </div>
            <div class="p-0 overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 dark:bg-black/20 text-aws-textMuted dark:text-aws-textMutedDark text-xs uppercase font-bold border-b border-aws-border dark:border-aws-borderDark">
                        <tr>
                            <th class="px-5 py-3 w-40">Last Seen</th>
                            <th class="px-5 py-3 w-32">App</th>
                            <th class="px-5 py-3">Error Message</th>
                            <th class="px-5 py-3 w-24 text-center">Count</th>
                            <th class="px-5 py-3 w-32">Status</th>
                        </tr>
                    </thead>
                    <tbody id="alerts-container" class="divide-y divide-aws-border dark:divide-aws-borderDark text-[#16191f] dark:text-[#d5d9e2]">
                        <tr id="no-alerts-row">
                            <td colspan="5" class="px-5 py-8 text-center text-aws-textMuted dark:text-aws-textMutedDark">No active critical alerts</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('logrider_token');
        const role = localStorage.getItem('logrider_role') || 'unknown';
        if (!token) {
            window.location.href = '/dashboard';
        } else {
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('role-badge').innerText = role.toUpperCase();
            if (role === 'admin') {
                document.getElementById('nav-config').classList.remove('hidden');
            }
            connectWS();
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            lightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/dashboard';
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        let ws;
        let activeAlerts = {};

        async function md5(message) {
            const msgUint8 = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('MD5', msgUint8).catch(() => crypto.subtle.digest('SHA-1', msgUint8));
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex.substring(0, 8);
        }

        function connectWS() {
            let wsUrl = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/api/ws`;
            ws = new WebSocket(wsUrl);

            ws.onmessage = async (event) => {
                let data;
                try { data = JSON.parse(event.data); } catch (e) { return; }
                
                let log = null;
                if (data.type === 'ALERT_STREAM' && data.log) {
                    log = data.log;
                } else if (data.Log_Level === 'ERROR' || data.Log_Level === 'CRITICAL' || data.Application_Name) {
                    log = data;
                }
                
                if (log) {
                    const errorHash = await md5(log.Message || '');
                    
                    if (!activeAlerts[errorHash]) {
                        activeAlerts[errorHash] = {
                            errorHash,
                            count: 0,
                            log: log,
                            message: log.Message || `CRITICAL ALERT: ${log.Application_Name} has encountered an error.`
                        };
                    }
                    
                    activeAlerts[errorHash].count += 1;
                    activeAlerts[errorHash].log.Timestamp = log.Timestamp; // update time
                    
                    if (activeAlerts[errorHash].count >= 100) {
                        activeAlerts[errorHash].message = `ESCALATION: ${log.Application_Name} is failing rapidly! (${activeAlerts[errorHash].count} identical errors)`;
                    }
                    
                    renderAlerts();
                }
            };

            ws.onclose = () => {
                setTimeout(connectWS, 2000);
            };
        }

        function renderAlerts() {
            const container = document.getElementById('alerts-container');
            const noAlerts = document.getElementById('no-alerts-row');
            
            const alertKeys = Object.keys(activeAlerts);
            if (alertKeys.length === 0) {
                if (!noAlerts) {
                    container.innerHTML = `
                        <tr id="no-alerts-row">
                            <td colspan="5" class="px-5 py-8 text-center text-aws-textMuted dark:text-aws-textMutedDark">No active critical alerts</td>
                        </tr>
                    `;
                }
                return;
            }
            
            if (noAlerts) noAlerts.remove();
            
            const alertsArray = Object.values(activeAlerts);
            alertsArray.sort((a, b) => b.count - a.count);
            
            for (const alert of alertsArray) {
                const errorHash = alert.errorHash;
                const count = alert.count || 1;
                const app = alert.log?.Application_Name || '-';
                const msg = escapeHTML(alert.message);
                const time = alert.log?.Timestamp || alert.log?.timestamp || '-';
                
                let rowClass = "hover:bg-blue-50/50 dark:hover:bg-white/5 transition-colors";
                let statusHtml = '<span class="bg-yellow-500 text-white text-xs font-bold px-2 py-0.5 rounded uppercase">Tracking</span>';
                
                if (count >= 100) {
                    rowClass += " bg-red-50 dark:bg-red-900/20";
                    statusHtml = '<span class="bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded uppercase">Escalated</span>';
                }
                
                const rowId = `alert-${errorHash}`;
                let tr = document.getElementById(rowId);
                
                if (tr) {
                    tr.className = rowClass;
                    tr.querySelector('.alert-count').innerText = count;
                    tr.querySelector('.alert-time').innerHTML = escapeHTML(time);
                    tr.querySelector('.alert-status').innerHTML = statusHtml;
                    tr.querySelector('.alert-msg').innerText = msg;
                    container.appendChild(tr);
                } else {
                    tr = document.createElement('tr');
                    tr.id = rowId;
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td class="px-5 py-3 font-mono text-xs alert-time">${escapeHTML(time)}</td>
                        <td class="px-5 py-3 font-medium text-xs">${escapeHTML(app)}</td>
                        <td class="px-5 py-3 text-xs alert-msg">${msg}</td>
                        <td class="px-5 py-3 font-bold text-xs"><span class="px-2 py-1 bg-aws-panel dark:bg-aws-panelDark border border-aws-border dark:border-aws-borderDark rounded text-aws-primary dark:text-aws-primaryDark">x<span class="alert-count">${count}</span></span></td>
                        <td class="px-5 py-3 text-right alert-status">${statusHtml}</td>
                    `;
                    container.appendChild(tr);
                }
            }
        }
            ws.onclose = () => {
                setTimeout(connectWS, 2000);
            };
        }
    </script>
</body>
</html>
