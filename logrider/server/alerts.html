<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log-rider - Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aws: {
                            nav: '#0f1b2d', bg: '#f2f3f3', bgDark: '#0f1b2d', panel: '#ffffff', panelDark: '#1c2539',
                            border: '#eaeded', borderDark: '#414d5c', text: '#16191f', textDark: '#ffffff',
                            textMuted: '#545b64', textMutedDark: '#9ba7b6', primary: '#0972d3', primaryHover: '#035b96',
                            link: '#0073bb', linkDark: '#44b9ff'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-aws-bg text-aws-text dark:bg-aws-bgDark dark:text-aws-textDark antialiased transition-colors duration-200">
    <header class="bg-aws-nav text-white flex items-center justify-between px-4 py-3 sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <a href="/dashboard" class="flex items-center space-x-2 no-underline text-white hover:text-gray-200">
                <span class="font-semibold text-lg tracking-tight">log-rider</span>
                <span class="bg-orange-600/20 text-orange-400 border border-orange-500/30 text-xs px-2 py-0.5 rounded-full font-medium ml-2">Alerts Engine</span>
            </a>
            <nav class="hidden md:flex space-x-4">
                <a href="/dashboard" class="text-sm font-medium hover:text-white text-gray-300 transition-colors">Dashboard</a>
                <a href="/alerts" class="text-sm font-medium text-white transition-colors">Alerts</a>
                <a id="nav-config" href="/config" class="text-sm font-medium hover:text-white text-gray-300 transition-colors hidden">Config</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="logout()" class="bg-aws-primary hover:bg-aws-primaryHover text-white px-3 py-1 text-xs font-bold rounded-full transition-colors border border-transparent shadow-sm">Sign Out</button>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 py-8 space-y-6" id="app-content" style="display:none;">
        <h1 class="text-2xl font-bold text-aws-text dark:text-aws-textDark mb-2">Real-Time Alerts Monitor</h1>
        <p class="text-sm text-aws-textMuted dark:text-aws-textMutedDark mb-6">Monitors deduplicated critical error streams with real-time counters.</p>
        
        <div class="bg-aws-panel dark:bg-aws-panelDark border border-aws-border dark:border-aws-borderDark rounded-lg shadow-sm">
            <div class="px-5 py-4 border-b border-aws-border dark:border-aws-borderDark bg-gray-50/50 dark:bg-black/10 rounded-t-lg flex justify-between">
                <h2 class="text-lg font-bold text-red-600 dark:text-red-400 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Active Incident Filters
                </h2>
                <div class="flex items-center space-x-2 text-sm text-aws-textMuted dark:text-aws-textMutedDark">
                    <span class="relative flex h-2.5 w-2.5 mr-1">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                    Live Updates
                </div>
            </div>
            <div class="p-0 overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 dark:bg-black/20 text-aws-textMuted dark:text-aws-textMutedDark text-xs uppercase font-bold border-b border-aws-border dark:border-aws-borderDark">
                        <tr>
                            <th class="px-5 py-3 w-40">Last Seen</th>
                            <th class="px-5 py-3 w-32">App</th>
                            <th class="px-5 py-3">Error Message</th>
                            <th class="px-5 py-3 w-24 text-center">Count</th>
                            <th class="px-5 py-3 w-32">Status</th>
                        </tr>
                    </thead>
                    <tbody id="alerts-container" class="divide-y divide-aws-border dark:divide-aws-borderDark text-[#16191f] dark:text-[#d5d9e2]">
                        <tr id="no-alerts-row">
                            <td colspan="5" class="px-5 py-8 text-center text-aws-textMuted dark:text-aws-textMutedDark">No active critical alerts</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('logrider_token');
        const role = localStorage.getItem('logrider_role');
        if (!token) {
            window.location.href = '/dashboard';
        } else {
            document.getElementById('app-content').style.display = 'block';
            if (role === 'admin') {
                document.getElementById('nav-config').classList.remove('hidden');
            }
            connectWS();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/dashboard';
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        let ws;
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/ws?token=${token}`;
            ws = new WebSocket(wsUrl);

            ws.onmessage = (event) => {
                let data;
                try { data = JSON.parse(event.data); } catch (e) { return; }
                
                if (data.type === 'ALERT') {
                    const noAlerts = document.getElementById('no-alerts-row');
                    if (noAlerts) noAlerts.remove();

                    const errorHash = data.errorHash;
                    const count = data.count || 1;
                    const app = data.log?.Application_Name || '-';
                    const msg = escapeHTML(data.message);
                    const time = data.log?.Timestamp || data.log?.timestamp || '-';
                    
                    let row = document.getElementById('alert-' + errorHash);
                    if (row) {
                        // Update existing row
                        row.querySelector('.alert-count').innerText = count;
                        row.querySelector('.alert-time').innerText = escapeHTML(time);
                        row.querySelector('.alert-msg').innerText = msg;
                        
                        if (count >= 100) {
                            row.querySelector('.alert-status').innerHTML = '<span class="bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded uppercase">Escalated</span>';
                            row.classList.add('bg-red-50', 'dark:bg-red-900/20');
                        }
                    } else {
                        // Create new row
                        row = document.createElement('tr');
                        row.id = 'alert-' + errorHash;
                        row.className = "hover:bg-blue-50/50 dark:hover:bg-white/5 transition-colors";
                        row.innerHTML = `
                            <td class="px-5 py-3 font-mono text-xs alert-time">${escapeHTML(time)}</td>
                            <td class="px-5 py-3 font-medium text-xs">${escapeHTML(app)}</td>
                            <td class="px-5 py-3 font-mono text-xs whitespace-normal break-words alert-msg text-red-600 dark:text-red-400 font-bold">${msg}</td>
                            <td class="px-5 py-3 font-bold text-center alert-count text-lg">${count}</td>
                            <td class="px-5 py-3 alert-status">
                                <span class="bg-yellow-500 text-white text-xs font-bold px-2 py-0.5 rounded uppercase">Tracking</span>
                            </td>
                        `;
                        document.getElementById('alerts-container').prepend(row);
                    }
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectWS, 2000);
            };
        }
    </script>
</body>
</html>
