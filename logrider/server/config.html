<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config | log-rider</title>
    <link href="https://fonts.cdnfonts.com/css/amazon-ember" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aws: {
                            nav: '#0f1b2d', navDark: '#0b1426', bg: '#f2f3f3', bgDark: '#0f1b2d', panel: '#ffffff', panelDark: '#1c2539',
                            border: '#eaeded', borderDark: '#414d5c', text: '#16191f', textDark: '#ffffff',
                            textMuted: '#545b64', textMutedDark: '#9ba7b6', primary: '#0972d3', primaryHover: '#035b96',
                            link: '#0073bb', linkDark: '#44b9ff'
                        }
                    },
                    fontFamily: {
                        sans: ['"Amazon Ember"', 'sans-serif'],
                        mono: ['Menlo', 'Monaco', 'Consolas', '"Courier New"', 'monospace']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-in': 'slideIn 0.2s ease-out',
                        'zoom-in': 'zoomIn 0.2s ease-out',
                        'zoom-out': 'zoomOut 0.2s ease-in forwards',
                        'shrink-fade': 'shrinkFade 0.3s ease-out forwards',
                        'flash': 'flash 0.5s ease-out'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateX(-10px)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' },
                        },
                        zoomIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        zoomOut: {
                            '0%': { transform: 'scale(1)', opacity: '1' },
                            '100%': { transform: 'scale(0)', opacity: '0' },
                        },
                        shrinkFade: {
                            '0%': { transform: 'scale(1)', opacity: '1', height: 'auto' },
                            '100%': { transform: 'scale(0.95)', opacity: '0', height: '0', overflow: 'hidden', padding: '0', margin: '0', border: 'none' },
                        },
                        flash: {
                            '0%, 100%': { backgroundColor: 'transparent' },
                            '50%': { backgroundColor: 'rgba(52, 211, 153, 0.2)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .chip-btn {
            display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .chip-btn.active {
            background-color: rgba(9, 114, 211, 0.15); color: #0073bb; border-color: rgba(9, 114, 211, 0.3);
        }
        .dark .chip-btn.active {
            background-color: rgba(68, 185, 255, 0.15); color: #44b9ff; border-color: rgba(68, 185, 255, 0.3);
        }
        .chip-btn:not(.active) {
            background-color: #f3f4f6; color: #6b7280; border-color: #e5e7eb; opacity: 0.7;
        }
        .dark .chip-btn:not(.active) {
            background-color: rgba(255,255,255,0.05); color: #9ca3af; border-color: rgba(255,255,255,0.1);
        }

        button, a, select, input { transition: transform 0.1s, filter 0.1s; }
        button:active { transform: scale(0.95); filter: brightness(0.9); }
        .dropdown-content { display: none; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body class="bg-aws-bg text-aws-text dark:bg-aws-bgDark dark:text-aws-textDark antialiased transition-colors duration-200 animate-fade-in">
    <header class="bg-aws-nav text-white flex items-center justify-between px-4 py-3 sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <a href="/dashboard" class="flex items-center space-x-2 no-underline text-white hover:text-gray-200">
                <span class="font-semibold text-lg tracking-tight flex items-center">log-rider</span>
                <span class="bg-aws-primary/20 text-aws-link dark:text-aws-linkDark border border-aws-primary/30 text-xs px-2 py-0.5 rounded-full font-medium ml-2">Console</span>
            </a>
            <nav id="top-nav" class="hidden md:flex space-x-4 items-center">
                <a href="/dashboard" class="text-sm font-medium hover:text-white text-gray-300 transition-colors pb-0.5">Dashboard</a>
                <a href="/alerts" class="text-sm font-medium hover:text-white text-gray-300 transition-colors pb-0.5">Alerts</a>
                <a href="/config" class="text-sm font-medium hover:text-white text-white transition-colors border-b-2 border-aws-primary pb-0.5">Config</a>
                <a href="/metrics" class="text-sm font-medium hover:text-white text-gray-300 transition-colors pb-0.5">Metrics</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            
            <a href="https://github.com/NTDuck/log-rider" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="p-1.5 rounded-full hover:bg-white/10 transition-colors">
                <svg class="w-5 h-5 text-gray-300 hover:text-white transition-colors" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path></svg>
            </a>
            <a href="https://deepwiki.com/NTDuck/log-rider" target="_blank" rel="noopener noreferrer" aria-label="Deepwiki" class="p-1.5 rounded-full hover:bg-white/10 transition-colors">
                <svg class="w-5 h-5 text-gray-300 hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </a>
<button id="theme-toggle" class="p-1.5 bg-white/10 rounded-full hover:bg-white/20 transition-colors focus:outline-none focus:ring-2 focus:ring-aws-primary" aria-label="Toggle Dark Mode">
                <svg id="theme-toggle-dark-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
            </button>
            <div id="user-controls" class="flex items-center space-x-4 text-sm font-medium">
                <div class="flex items-center space-x-2 bg-black/20 rounded-md px-3 py-1.5 border border-white/10">
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span id="role-badge" class="text-gray-200"></span>
                </div>
                <button onclick="logout()" class="bg-aws-primary hover:bg-aws-primaryHover text-white px-3 py-1 text-xs font-bold rounded-full transition-colors border border-transparent shadow-sm">Sign Out</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1000px] mx-auto px-4 py-8 space-y-6" id="app-content" style="display:none;">
        <h1 class="text-2xl font-bold text-aws-text dark:text-aws-textDark mb-6">Global Configuration</h1>
        
        <!-- TTL Panel -->
        <div class="bg-aws-panel dark:bg-aws-panelDark border border-aws-border dark:border-aws-borderDark rounded-lg shadow-sm">
            <div class="px-5 py-4 border-b border-aws-border dark:border-aws-borderDark bg-gray-50/50 dark:bg-black/10 rounded-t-lg">
                <h2 class="text-lg font-bold">Alert Deduplication Rules</h2>
            </div>
            <div class="p-5">
                <label class="block text-sm font-bold mb-4 text-center">Redis Alert TTL</label>
                <div class="flex items-center space-x-4 w-full">
                    <div class="flex flex-col flex-grow items-center relative pb-6 w-full">
                        <input type="range" id="ttl-input" min="0" max="11" step="1" class="w-full transition-colors duration-300" style="accent-color: hsl(120, 80%, 50%);">
                        <div class="flex justify-between w-full absolute top-6 px-1 text-[11px] text-aws-textMuted dark:text-aws-textMutedDark font-mono font-bold">
                            <span>1s</span><span>10s</span><span>30s</span><span>1m</span><span>10m</span><span>30m</span>
                            <span>1h</span><span>3h</span><span>6h</span><span>9h</span><span>12h</span><span>24h</span>
                        </div>
                    </div>
                    <button onclick="updateTTL()" class="shrink-0 px-5 py-2 rounded-full text-sm font-bold bg-aws-primary hover:bg-aws-primaryHover transition-colors shadow-sm text-white relative -top-3">Save</button>
                </div>
                <p id="ttl-status" class="text-green-600 dark:text-green-400 text-sm font-medium hidden text-right"></p>
            </div>
            
            <div class="p-5 border-t border-aws-border dark:border-aws-borderDark">
                <label class="block text-sm font-bold mb-4 text-center">Clickhouse TTL</label>
                <div class="flex items-center space-x-4 w-full">
                    <div class="flex flex-col flex-grow items-center relative pb-6 w-full">
                        <input type="range" id="ch-ttl-input" min="0" max="8" step="1" class="w-full transition-colors duration-300" style="accent-color: hsl(120, 80%, 50%);">
                        <div class="flex justify-between w-full absolute top-6 px-1 text-[11px] text-aws-textMuted dark:text-aws-textMutedDark font-mono font-bold">
                            <span>1h</span><span>3h</span><span>6h</span><span>9h</span><span>12h</span>
                            <span>1d</span><span>7d</span><span>14d</span><span>28d</span>
                        </div>
                    </div>
                    <button onclick="updateChTTL()" class="shrink-0 px-5 py-2 rounded-full text-sm font-bold bg-aws-primary hover:bg-aws-primaryHover transition-colors shadow-sm text-white relative -top-3">Save</button>
                </div>
                <p id="ch-ttl-status" class="text-green-600 dark:text-green-400 text-sm font-medium hidden text-right"></p>
            </div>
        </div>

        <!-- User Management Panel -->
        <div class="bg-aws-panel dark:bg-aws-panelDark border border-aws-border dark:border-aws-borderDark rounded-lg shadow-sm">
            <div class="px-5 py-4 border-b border-aws-border dark:border-aws-borderDark bg-gray-50/50 dark:bg-black/10 rounded-t-lg flex justify-between items-center">
                <h2 class="text-lg font-bold">User Management</h2>
                <div class="flex items-center space-x-2 bg-white dark:bg-[#16191f] border border-gray-300 dark:border-gray-600 p-1.5 rounded shadow-sm w-64">
                    <select id="global-search-col" class="bg-transparent text-sm font-bold text-aws-text dark:text-aws-textDark focus:outline-none cursor-pointer pl-1" onchange="renderUsers()">
                        <option value="username">Username</option>
                    </select>
                    <div class="w-px h-5 bg-gray-300 dark:bg-gray-600 mx-1"></div>
                    <input type="text" id="global-search-val" oninput="renderUsers()" placeholder="Search..." class="flex-grow px-2 text-sm bg-transparent border-none focus:outline-none text-aws-text dark:text-aws-textDark w-full">
                </div>
            </div>
            <div class="p-0 overflow-visible">
                <table class="w-full text-left text-sm whitespace-nowrap mb-2">
                    <thead class="bg-gray-50 dark:bg-black/20 text-aws-textMuted dark:text-aws-textMutedDark text-xs uppercase font-bold border-b border-aws-border dark:border-aws-borderDark">
                        <tr>
                            <th class="px-4 py-3 align-top w-48">
                                <span>Username</span>
                            </th>
                            <th class="px-4 py-3 align-top w-32 relative dropdown">
                                <div class="flex items-center cursor-pointer">
                                    <span>Role <span id="role-count" class="ml-1 font-normal opacity-80"></span></span>
                                    <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                                <div class="dropdown-content absolute bg-white dark:bg-aws-panelDark border border-gray-200 dark:border-gray-700 shadow-lg rounded mt-1 p-2 z-10 font-normal normal-case text-xs min-w-[150px]">
                                    <div class="flex justify-between mb-2 border-b border-gray-200 dark:border-gray-600 pb-2">
                                        <button type="button" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-aws-primary" onclick="setRoleFilter(true)" title="Select All">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                        </button>
                                        <button type="button" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-red-500" onclick="setRoleFilter(false)" title="Deselect All">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    </div>
                                    <div class="flex flex-wrap gap-1 mt-2">
                                        <button type="button" class="r-filter chip-btn active" data-val="admin" onclick="toggleChip(this); renderUsers()">admin</button>
                                        <button type="button" class="r-filter chip-btn active" data-val="engineer" onclick="toggleChip(this); renderUsers()">engineer</button>
                                    </div>
                                </div>
                            </th>
                            <th class="px-4 py-3 align-top">
                                <span>Allowed Apps</span>
                            </th>
                            <th class="px-4 py-3 align-top w-16 text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="users-table" class="divide-y divide-aws-border dark:divide-aws-borderDark">
                    </tbody>
                </table>
                <div class="px-4 pb-4">
                    <button onclick="showAddRow()" class="w-8 h-8 flex items-center justify-center rounded-full bg-aws-primary hover:bg-aws-primaryHover text-white mx-auto shadow-sm transition-all animate-fade-in">+</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('logrider_token');
        const role = localStorage.getItem('logrider_role');
        window.allUsers = [];
        window.allApps = new Set();
        
        const alertTTLValues = [1, 10, 30, 60, 600, 1800, 3600, 10800, 21600, 32400, 43200, 86400];
        const chTTLValues = [1, 3, 6, 9, 12, 24, 168, 336, 672];

        if (!token || role !== 'admin') {
            window.location.href = '/dashboard';
        } else {
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('role-badge').innerText = role.toUpperCase();
            loadData();
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            lightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/dashboard';
        }

        function updateSliderColor(slider) {
            if (!slider) return;
            const ratio = slider.value / slider.max;
            // Hue from 120 (green) at 0, to 0 (red) at max
            const hue = 120 * (1 - ratio);
            slider.style.accentColor = `hsl(${hue}, 80%, 50%)`;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input[type="range"]').forEach(slider => {
                slider.addEventListener('input', (e) => updateSliderColor(e.target));
            });
        });

        async function loadData() {
            const resTTL = await fetch('/api/config/ttl');
            if (resTTL.ok) {
                const data = await resTTL.json();
                const idx = alertTTLValues.indexOf(data.ttl);
                if (idx !== -1) document.getElementById('ttl-input').value = idx;
                else {
                    alertTTLValues.push(data.ttl);
                    alertTTLValues.sort((a,b)=>a-b);
                    document.getElementById('ttl-input').max = alertTTLValues.length - 1;
                    document.getElementById('ttl-input').value = alertTTLValues.indexOf(data.ttl);
                }
                updateSliderColor(document.getElementById('ttl-input'));
            }
            const resChTTL = await fetch('/api/config/clickhouse-ttl', { headers: { 'Authorization': 'Bearer ' + token } });
            if (resChTTL.ok) {
                const data = await resChTTL.json();
                const idx = chTTLValues.indexOf(data.ttl_hours);
                if (idx !== -1) document.getElementById('ch-ttl-input').value = idx;
                else {
                    chTTLValues.push(data.ttl_hours);
                    chTTLValues.sort((a,b)=>a-b);
                    document.getElementById('ch-ttl-input').max = chTTLValues.length - 1;
                    document.getElementById('ch-ttl-input').value = chTTLValues.indexOf(data.ttl_hours);
                }
                updateSliderColor(document.getElementById('ch-ttl-input'));
            }
            const resUsers = await fetch('/api/users', { headers: { 'Authorization': 'Bearer ' + token } });
            if (resUsers.ok) {
                const data = await resUsers.json();
                window.allUsers = data.users;
                
                window.allApps = new Set();
                window.allUsers.forEach(u => {
                    if (u.allowed_apps) {
                        u.allowed_apps.split(',').forEach(a => window.allApps.add(a));
                    }
                });
                renderUsers();
            }
        }

        async function updateTTL() {
            const idx = document.getElementById('ttl-input').value;
            const ttl = alertTTLValues[idx];
            const res = await fetch('/api/config/ttl', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ ttl })
            });
            if (res.ok) {
                document.getElementById('ttl-status').innerText = 'TTL Saved!';
                document.getElementById('ttl-status').classList.remove('hidden');
                setTimeout(() => document.getElementById('ttl-status').classList.add('hidden'), 2000);
            }
        }

        async function updateChTTL() {
            const idx = document.getElementById('ch-ttl-input').value;
            const ttl = chTTLValues[idx];
            const res = await fetch('/api/config/clickhouse-ttl', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ ttl_hours: ttl })
            });
            if (res.ok) {
                document.getElementById('ch-ttl-status').innerText = 'ClickHouse TTL Saved!';
                document.getElementById('ch-ttl-status').classList.remove('hidden');
                setTimeout(() => document.getElementById('ch-ttl-status').classList.add('hidden'), 2000);
            }
        }

        // Filters
        function setRoleFilter(val) {
            document.querySelectorAll('.r-filter').forEach(cb => cb.checked = (val !== 'none'));
            renderUsers();
        }
        function setAppFilter(checked) {
            document.querySelectorAll('.a-filter').forEach(cb => cb.checked = checked);
        
        document.querySelectorAll('.r-filter').forEach(cb => cb.addEventListener('change', renderUsers));

        function renderAppFilter() {
            // Disabled: Filter removed from UI
        }

        function renderUsers() {
            const searchCol = document.getElementById('global-search-col') ? document.getElementById('global-search-col').value : null;
            const searchVal = document.getElementById('global-search-val') ? document.getElementById('global-search-val').value.toLowerCase() : '';
            const checkedRoles = Array.from(document.querySelectorAll('.r-filter.active')).map(btn => btn.getAttribute('data-val'));
            
            if (document.getElementById('role-count')) document.getElementById('role-count').textContent = '(' + checkedRoles.length + ')';
            
            const sorted = [...window.allUsers].sort((a, b) => {
                if (a.role === b.role) return a.username.localeCompare(b.username);
                return a.role.localeCompare(b.role);
            });
            
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '';
            
            sorted.forEach(u => {
                let matchSearch = true;
                if (searchVal && searchCol) {
                    if (searchCol === 'username') matchSearch = u.username.toLowerCase().includes(searchVal);
                }
                
                if (!matchSearch) return;
                if (!checkedRoles.includes(u.role)) return;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 dark:hover:bg-white/5 transition-colors group";
                
                let appsHtml = '';
                if (u.role === 'admin') {
                    appsHtml = '<span class="text-xs text-gray-500 italic">All Apps (Admin)</span>';
                } else {
                    if (u.allowed_apps) {
                        appsHtml = u.allowed_apps.split(',').filter(Boolean).map(a => `
                            <div class="group inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-white/10 mr-1 mb-1 transition-all overflow-hidden">
                                <span>${a}</span>
                                <button class="hidden group-hover:block ml-1 text-red-500 hover:text-red-700 active:scale-95 transition-all" onclick="removeApp(event, '${u.username}', '${a}')">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        `).join('');
                    }
                    appsHtml += `
                        <button onclick="showAppInput('${u.username}', this)" class="inline-flex items-center px-1 py-1 rounded-full text-xs font-bold border border-aws-link text-aws-link hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all active:scale-95">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    `;
                }

                tr.innerHTML = `
                    <td class="px-4 py-3 font-medium text-aws-text dark:text-aws-textDark">${u.username}</td>
                    <td class="px-4 py-3 text-aws-textMuted dark:text-aws-textMutedDark">${u.role}</td>
                    <td class="px-4 py-3 flex flex-wrap items-center gap-1">${appsHtml}</td>
                    <td class="px-4 py-3 text-center">
                        ${u.role !== 'admin' ? `
                        <button onclick="deleteUserWithAnim('${u.username}', this)" class="text-red-500 hover:text-red-700 opacity-0 group-hover:opacity-100 transition-opacity active:scale-95">
                            <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        ` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showAppInput(username, btn) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'px-2 py-0.5 rounded-full text-xs font-medium border border-aws-primary bg-white dark:bg-black text-aws-text dark:text-aws-textDark w-24 outline-none';
            input.placeholder = 'App name';
            
            input.onblur = () => saveNewApp(username, input.value);
            input.onkeydown = (e) => {
                if (e.key === 'Enter') input.blur();
                if (e.key === 'Escape') { input.value = ''; input.blur(); }
            };
            
            btn.replaceWith(input);
            input.focus();
        }

        async function saveNewApp(username, val) {
            val = val.trim();
            if (!val) {
                renderUsers(); // Restore the + button
                return;
            }
            const u = window.allUsers.find(x => x.username === username);
            const apps = u.allowed_apps ? u.allowed_apps.split(',') : [];
            if (!apps.includes(val)) {
                apps.push(val);
                u.allowed_apps = apps.join(',');
                await saveUserDirectly(u);
            } else {
                renderUsers();
            }
        }

        async function removeApp(e, username, app) {
            e.stopPropagation();
            const btn = e.currentTarget;
            const pill = btn.closest('div');
            pill.classList.add('animate-zoom-out');
            
            setTimeout(async () => {
                const u = window.allUsers.find(x => x.username === username);
                u.allowed_apps = u.allowed_apps.split(',').filter(a => a !== app).join(',');
                await saveUserDirectly(u);
            }, 200);
        }

        async function saveUserDirectly(u) {
            await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({
                    username: u.username,
                    role: u.role,
                    allowed_apps: u.allowed_apps
                })
            });
            loadData();
        }

        function showAddRow() {
            const tbody = document.getElementById('users-table');
            const tr = document.createElement('tr');
            tr.className = "bg-blue-50/50 dark:bg-blue-900/20 animate-slide-in";
            tr.innerHTML = `
                <td class="px-4 py-3"><input type="text" id="new-u" class="w-full text-xs px-2 py-1 border rounded dark:bg-[#16191f] border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-1 focus:ring-aws-link" placeholder="username"></td>
                <td class="px-4 py-3">
                    <input type="password" id="new-p" class="w-full text-xs px-2 py-1 border rounded dark:bg-[#16191f] border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-1 focus:ring-aws-link" placeholder="password">
                </td>
                <td class="px-4 py-3"><input type="text" id="new-a" class="w-full text-xs px-2 py-1 border rounded dark:bg-[#16191f] border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-1 focus:ring-aws-link" placeholder="apps (comma separated)"></td>
                <td class="px-4 py-3 text-center flex items-center justify-center space-x-2">
                    <button onclick="saveNewUser(this)" class="text-green-500 hover:text-green-700 active:scale-95 transition-all w-6 h-6 flex items-center justify-center rounded-full hover:bg-green-100 dark:hover:bg-green-900/30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </button>
                    <button onclick="this.closest('tr').remove()" class="text-gray-400 hover:text-red-500 active:scale-95 transition-all w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-50 dark:hover:bg-red-900/30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        async function saveNewUser(btn) {
            const tr = btn.closest('tr');
            const username = document.getElementById('new-u').value;
            const password = document.getElementById('new-p').value;
            const allowed_apps = document.getElementById('new-a').value;
            const role = 'engineer';
            
            if (!username || !password) return alert('Username and Password required');
            
            tr.innerHTML = '<td colspan="4" class="px-4 py-3 text-center text-xs">Saving...</td>';
            const res = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ username, password, role, allowed_apps })
            });
            
            if (res.ok) {
                tr.className = "bg-green-100 dark:bg-green-900/50 transition-colors duration-500";
                setTimeout(() => {
                    tr.className = "hover:bg-blue-50/50 dark:hover:bg-white/5 transition-colors group";
                    window.allUsers.push({ username, role, allowed_apps });
                    
                    let appsHtml = '';
                    if (allowed_apps) {
                        appsHtml = allowed_apps.split(',').filter(Boolean).map(a => `
                            <div class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-white/10 cursor-pointer mr-1 mb-1 transition-all overflow-hidden" onclick="toggleTrash(this)">
                                <span>${a}</span>
                                <button class="hidden ml-1 text-red-500 hover:text-red-700 active:scale-95 transition-all" onclick="removeApp(event, '${username}', '${a}')">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        `).join('');
                    }
                    appsHtml += `
                        <button onclick="addDummyApp('${username}')" class="inline-flex items-center px-1 py-1 rounded-full text-xs font-bold border border-aws-link text-aws-link hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all active:scale-95">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    `;

                    tr.innerHTML = `
                        <td class="px-4 py-3 font-medium text-aws-text dark:text-aws-textDark">${username}</td>
                        <td class="px-4 py-3 text-aws-textMuted dark:text-aws-textMutedDark">${role}</td>
                        <td class="px-4 py-3 flex flex-wrap items-center gap-1">${appsHtml}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="deleteUserWithAnim('${username}', this)" class="text-red-500 hover:text-red-700 opacity-0 group-hover:opacity-100 transition-opacity active:scale-95">
                                <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    `;
                }, 1000);
            } else {
                alert('Error saving user');
                tr.remove();
            }
        }

        function deleteUserWithAnim(username, btn) {
            if (!confirm('Delete user ' + username + '?')) return;
            const tr = btn.closest('tr');
            tr.classList.add('animate-shrink-fade');
            setTimeout(async () => {
                await fetch('/api/users/' + username, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                loadData();
            }, 300);
        }
    </script>
</body>
</html>
