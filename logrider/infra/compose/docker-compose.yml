services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
    # image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 768M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - >-
        --advertise-kafka-addr
        PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    mem_limit: 1g
    # Redpanda ports removed to prevent unauthenticated ingress
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test:
        - CMD
        - rpk
        - cluster
        - health
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    mem_limit: 256m
    # Redis is internal-only
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    mem_limit: 1.5g
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      CLICKHOUSE_DB: logrider_analytics
    # ClickHouse ports removed to prevent exposure
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - >-
        ../clickhouse/migrations/001_init.sql:/docker-entrypoint-initdb.d/init-clickhouse.sql
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:8123/ping
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logrider}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: logrider
    # Postgres ports removed to prevent exposure
    volumes:
      - >-
        ../postgres/migrations/001_users.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-logrider} -d logrider
      interval: 10s
      timeout: 5s
      retries: 5

  stream-router:
    image: jeffail/benthos:4
    mem_limit: 256m
    volumes:
      - ../../pipelines/benthos/router/unified.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  log-event-writer:
    build: ../../apps/log-event-writer
    deploy:
      replicas: 8
    mem_limit: 256m
    environment:
      REDPANDA_BROKERS: redpanda:29092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      MIN_BATCH_ROWS: 10000
      MAX_BATCH_ROWS: 50000
      MAX_BATCH_INTERVAL: 1000
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ingest-api:
    build: ../../apps/ingest-api
    mem_limit: 256m
    ports:
      - "8085:8080"
    environment:
      REDPANDA_BROKERS: redpanda:29092
      INGEST_API_KEY: ${INGEST_API_KEY:-logrider-ingest-key}
      INGEST_TOPIC: logs-ingested
      HTTP_PORT: 8080
      GRPC_PORT: 50051
      MAX_RECORDS_PER_REQUEST: 5000
      MAX_BODY_BYTES: 5242880
    depends_on:
      redpanda:
        condition: service_healthy

  log-tag-writer:
    image: jeffail/benthos:4
    mem_limit: 256m
    volumes:
      - ../../pipelines/benthos/persistence/tags-to-clickhouse.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  alert-dedup-worker:
    build: ../../apps/alert-worker
    mem_limit: 256m
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      REDPANDA_BROKERS: redpanda:29092

  log-tagger:
    build:
      context: ../../apps/classifier-worker
      dockerfile: Dockerfile
    profiles: ["ml"]
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      ENABLE_ML_CLASSIFIER: "true"
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      TOKENIZERS_PARALLELISM: "false"
      MALLOC_ARENA_MAX: "2"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  log-tagger-lite:
    build:
      context: ../../apps/classifier-worker
      dockerfile: Dockerfile
    mem_limit: 384m
    memswap_limit: 384m
    environment:
      ENABLE_ML_CLASSIFIER: "false"
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    build: ../../apps/telegram-bot
    mem_limit: 128m
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

  web:
    build: ../../apps/web
    mem_limit: 512m
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-3000}
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      POSTGRES_URI: postgres://${POSTGRES_USER:-logrider}:${POSTGRES_PASSWORD:-password}@postgres:5432/logrider

  alert-realtime-forwarder:
    image: jeffail/benthos:4
    mem_limit: 128m
    volumes:
      - ../../pipelines/benthos/alerts/alerts-forwarder.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: -c /benthos.yaml

volumes:
  redpanda_data:
  redis_data:
  clickhouse_data:
  postgres_data:
