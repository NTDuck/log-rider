services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - >-
        --advertise-kafka-addr
        PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    # Redpanda ports removed to prevent unauthenticated ingress
    healthcheck:
      test:
        - CMD
        - rpk
        - cluster
        - health
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Redis is internal-only
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      CLICKHOUSE_DB: logrider
    # ClickHouse ports removed to prevent exposure
    volumes:
      - >-
        ./persist/init-clickhouse.sql:/docker-entrypoint-initdb.d/init-clickhouse.sql
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:8123/ping
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logrider}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: logrider
    # Postgres ports removed to prevent exposure
    volumes:
      - >-
        ./persist/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-logrider} -d logrider
      interval: 10s
      timeout: 5s
      retries: 5

  benthos-pipeline:
    image: jeffail/benthos:latest
    volumes:
      - ./pipelines/unified.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  benthos-persist:
    image: jeffail/benthos:latest
    volumes:
      - ./pipelines/persist.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  grpc-ingest:
    build: ./workers/grpc-ingest
    ports:
      - "50051:50051"
    environment:
      REDPANDA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  benthos-tags:
    image: jeffail/benthos:latest
    volumes:
      - ./pipelines/tags.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: -c /benthos.yaml

  alert-worker:
    build: ./workers/alert
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      REDPANDA_BROKERS: redpanda:29092
    deploy:
      replicas: 10

  classifier-worker:
    build:
      context: ./workers/classifier
      dockerfile: Dockerfile
    environment:
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    build: ./integrations/telegram
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

  web-server:
    build: ./server
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-3000}
      REDPANDA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
      POSTGRES_URI: postgres://${POSTGRES_USER:-logrider}:${POSTGRES_PASSWORD:-password}@postgres:5432/logrider

  benthos-alerts-forwarder:
    image: jeffail/benthos:latest
    volumes:
      - ./pipelines/forwarder.yaml:/benthos.yaml
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: -c /benthos.yaml
